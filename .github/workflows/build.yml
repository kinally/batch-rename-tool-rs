name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: batch-rename-tool-windows
          path: target/release/batch-rename-tool.exe

  # 打 tag 时自动创建 Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: batch-rename-tool-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: batch-rename-tool.exe
          body: |
            ## 批量文件重命名工具 v${{ github.ref_name }}

            ### 使用说明
            1. 下载 `batch-rename-tool.exe`
            2. 双击直接运行
            3. 导入 Excel/CSV → 添加文件 → 构建规则 → 执行重命名

            ### 系统要求
            - Windows 10+
            - 无需安装任何依赖
